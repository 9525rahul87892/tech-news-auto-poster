name: Auto Post Tech News to LinkedIn

on:
  schedule:
    # Runs every hour at minute 0
    - cron: '0 * * * *'
  
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

# Prevent concurrent runs
concurrency:
  group: auto-post
  cancel-in-progress: false

jobs:
  scrape-and-post:
    runs-on: ubuntu-latest
    
    # Grant write permission so we can commit posted_history.json
    permissions:
      contents: write
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: 📦 Install dependencies
        run: pip install -r requirements.txt
      
      - name: 🚀 Run auto-poster
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
        run: python main.py
      
      - name: 💾 Commit posted history
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add posted_history.json
          git diff --staged --quiet || git commit -m "📝 Update posted history [skip ci]"
          git push
